<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Heroes — Añadí tu super | Programación II</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Karla&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/formularios.css" />
  </head>
  <body>
    <!--
      Plantilla guía — Completá el markup según el frame «Añadir» de Figma.
      Recordá: los tests automáticos sólo miran este archivo y css/formularios.css.
    -->
    <div class="page-shell">
      <div class="top-bar">Descuentos 20%</div>

      <header class="brand-header">
        <p class="brand-title">DC Heroes</p>
      </header>

      <nav class="main-nav" aria-label="Principal">
        <a href="#">Contacto</a>
        <a href="#">Registrarme</a>
        <a href="#">Ingresar</a>
      </nav>

      <main class="page-main">
        <!-- TODO: envolver el formulario en <form method="post" action="#"> -->
        <!-- TODO: título «Añadí tu super!» y texto guía de la maqueta -->
        <!-- TODO: campos Nombre (*), Especie (*), Fecha, Foto, Descripción -->
        <!-- TODO: fieldset Poderes con 4 checkboxes -->
        <!-- TODO: fieldset Tipo de personaje con radios name="tipo-personaje" -->
        <!-- TODO: botón <button type="submit">Añadir</button> -->

        <form action="#" method="post">
          <h1>Añadi tu super!</h1>
          <h2>Agrega tu personaje favorito completando las opciones</h2>
          <div class="container">
            <label for="nombre">*Nombre</label>
            <input type="text" name="nombre" id="nombre" placeholder="Nombre">
          </div>
          <div class="container">
            <label for="especie">*Especie</label>
            <select name="especie" id="Especie">
              <option value="">Especie</option>
              <option value="alien">Alien</option>
              <option value="humano">Humano</option>
            </select>
          </div>
          <div class="container">
            <label for="fecha">Fecha</label>
            <input type="date" name="fecha" id="fecha">
          </div>
          <div class="container">
            <label for="foto">Agregar foto</label>
            <input type="file" name="foto" id="foto">
          </div>
          <div>
            <textarea name="descripcion" id="descripcion"
              placeholder="Descripcion"></textarea>
          </div>
          <div class="fieldcontainer">
            <fieldset class="fieldpoderes">
              <legend>Poderes</legend>
              <div class="opcioncheck">
                <input type="checkbox" name="poderes" value="volar" id="volar">
                <label for="volar">Volar</label>
              </div>
              <div class="opcioncheck">
                <input type="checkbox" name="poderes" value="superinteligencia"
                  id="superinteligencia">
                <label for="superinteligencia">Superinteligencia</label>
              </div>
              <div class="opcioncheck">
                <input type="checkbox" name="poderes" value="vista" id="vista">
                <label for="vista">Vista de rayo laser</label>
              </div>
              <div class="opcioncheck">
                <input type="checkbox" name="poderes" value="billetera"
                  id="billetera">
                <label for="billetera">Billetera gorda</label>
              </div>
            </fieldset>
            <hr>
            <fieldset class="fieldtipo">
              <legend>Tipo de personaje</legend>
              <div class="opcioncheck">
                <input type="radio" name="tipo-personaje" value="heroe">
                <label for="heroe">Heroe / Heroina</label>
              </div>

              <div class="opcioncheck">
                <input type="radio" name="tipo-personaje" value="villano">
                <label for="villano">Villano / Villana</label>
              </div>

            </fieldset>
          </div>

          <div class="boton">
            <button type="submit">Añadir</button>
          </div>
        </form>
      </main>

      <footer class="site-footer">
        <p>Todos los derechos reservados - [Giuliano Gani]</p>
        <img src="/img/Github Icon.png" alt="Github Icon">
      </footer>
    </div>
  </body>
</html>
